<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ligand:Protein Viewer</title>
  <script src="/static/scripts/ngl.js"></script>
  <script src="/static/scripts/jquery.min.js"></script> 

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
</head>
<body>
  <div>
  <script>
	var url;
	url="/pdbs/protein/{{ protein_fname }}";
  var stage;
  var drug;
  document.addEventListener("DOMContentLoaded", function () {
    var journal_color = NGL.ColormakerRegistry.addScheme(function (params) {
      this.atomColor = function (atom) {
        if (atom.serial < 6090) {
          return 0x00FFFF // cyan
        } else {
          return 0xFF00FF // magenta
        }
	    }
    });
    stage = new NGL.Stage("viewport",{backgroundColor:0xFFFFFF});
    stage.loadFile(url).then(function(o){
      o.addRepresentation("cartoon", {colorScheme: journal_color});
      stage.loadFile( "/pdbs/ligand/{{ drug_fname }}", { asTrajectory: true}).then(function(o){
        o.addRepresentation("ball+stick", {multipleBond:"symmetric"});
        drug = stage.compList[1];
        stage.viewer.container.addEventListener( "dblclick", function(){
          stage.toggleFullscreen();
        });
        o.autoView()
      });
    });
  });
  </script>
  <div id="viewport" style="width:90vw; height:80vh;"></div>
  <script></script>
</div>
Download Files:
<br>
<a href="/pdbs/protein/{{ protein_fname }}"> {{ protein_fname[:-4] }} </a>
<br>
<a href="/pdbs/ligand/{{ drug_fname }}"> {{ drug_fname.split("_")[1][:-4] }}</a>
</body>
</html>
