<!DOCTYPE html>
<html>
  <head>
    <title>CoVID-19 Interactive Drug Selector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  </head>
  <body>
    <header>
      <div class="container">
    </header>

    <strong>
    <nav>
      <div class="topnav" id="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('screening') }}">Screening</a>
        <a href="{{ url_for('about') }}">About</a>
        <img class="logo" src="../static/SMUlogo.png"></img>
        <a href="javascript:void(0);" class="icon" onclick="nav_response()">
          <svg height="7vh" viewBox="0 0 400 600" width="7vh" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <line x1="30" y1="200" x2="370" y2="200" style="stroke-width:50; stroke-linecap:round"/>
            <line x1="30" y1="300" x2="370" y2="300" style="stroke-width:50; stroke-linecap:round"/>
            <line x1="30" y1="400" x2="370" y2="400" style="stroke-width:50; stroke-linecap: round"/>
          </svg>
        </a>
      </div>
    </nav>
    </strong>
      </div>

      <script>
        function nav_response() {
          var x = document.getElementsByTagName("A");
          var i;
          for (i=0; i< x.length; i++) {
            if (x[i].className !== "icon") {
              console.log(x[i])
              x[i].classList.add("responsive");
            }
          }
          document.getElementsByClassName("container")[1].style.setProperty("padding-top","30vh");
          document.getElementsByClassName("topnav")[1].style.setProperty("height","40vh")
        }
      </script>

    <div class="container" style="padding-top:7vh;">
      {% block content %}
      {% endblock %}
    </div>
  </body>
</html>
